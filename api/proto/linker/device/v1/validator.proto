syntax = "proto3"; // Specifies the protobuf syntax version

option go_package = "./gen/go/linker/device/v1"; // Optional: Specifies the Go package name for generated code

package linker.device.v1; // Defines the package name for the service and messages

// Defines the message structure for a validator query
message ValidatorQuery {
  string device = 1;
  uint32 currency = 2;
  int64 operation = 3;
}

// Defines the message structure for a cash item
message ValidatorNote {
  uint32 currency = 1;
  int64 nominal = 2;
  uint32 count = 3;
  int64 amount = 4;
}

// DeviceState the message structure for a accepted note
message AcceptNotify {
  ValidatorNote note = 1;
}

// DeviceState the message structure for a cassette state
message BatchContent {
  int64 batch_id = 1;
  uint32 batch_state = 2;
  string details = 3;
  repeated ValidatorNote notes = 4;
}

