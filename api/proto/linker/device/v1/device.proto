syntax = "proto3"; // Specifies the protobuf syntax version

option go_package = "./gen/go/linker/device/v1"; // Optional: Specifies the Go package name for generated code

package linker.device.v1; // Defines the package name for the service and messages

// DeviceQuery defines the message structure for a device query
message DeviceQuery {
  string device = 1;
}

// DeviceReply defines the message structure for a command reply
message DeviceReply {
  string device = 1;
  string command = 2;
  uint32 action = 3;
  uint32 state = 4;
  uint32 err_code = 5;
  string err_text = 6;
}

// DeviceNotify defines the common part of callback message
message DeviceNotify {
  string device = 1;
  uint32 action = 2;
}

// StateNotify defines the message structure for a state change
message StateNotify {
  uint32 new_state = 1;
  uint32 old_state = 2;
}

// PromptNotify defines the message structure for user prompt
message PromptNotify {
  uint32 prompt = 1;
}

// InformNotify defines the message structure for reader return
message InformNotify {
  string inform = 1;
}

