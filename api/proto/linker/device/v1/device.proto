syntax = "proto3"; // Specifies the protobuf syntax version

option go_package = "./gen/go/linker/device/v1"; // Optional: Specifies the Go package name for generated code

package linker.device.v1; // Defines the package name for the service and messages

// Defines the message structure for a device query
message DeviceQuery {
  string device = 1;
  int64 timeout = 2;
  bool offline = 3;
}

// Defines the message structure for a command reply
message DeviceReply {
  string device = 1;
  string command = 2;
  uint32 action = 3;
  uint32 state = 4;
  uint32 err_code = 5;
  string err_text = 6;
}

// DeviceState the message structure for a state change
message DeviceState {
  string device = 1;
  uint32 action = 2;
  uint32 new_state = 3;
  uint32 old_state = 4;
}

// DeviceState the message structure for a state change
message DevicePrompt {
  string device = 1;
  uint32 action = 2;
  uint32 prompt = 3;
}

// DeviceState the message structure for a state change
message DeviceInform {
  string device = 1;
  uint32 action = 2;
  string inform = 3;
}

