syntax = "proto3"; // Specifies the protobuf syntax version

option go_package = "./gen/go/linker/device/v1"; // Optional: Specifies the Go package name for generated code

package linker.device.v1; // Defines the package name for the service and messages

import "linker/device/v1/reader.proto";

// Defines the gRPC service with an RPC method
service ReaderCallbackService {
  // CardPosition sends notification about new card position
  rpc CardPosition(CardPositionRequest) returns (CardPositionResponse) {}
  // CardDescription sends notification about card information
  rpc CardDescription(CardDescriptionRequest) returns (CardDescriptionResponse) {}
}

// Defines the message structure for a device reply request
message CardPositionRequest {
  CardPosition data = 1;
}

// Defines the message structure for the device reply response
message CardPositionResponse {}

// Defines the message structure for an execute error request
message CardDescriptionRequest {
  CardDescription data = 1;
}

// Defines the message structure for an execute error response
message CardDescriptionResponse {}
