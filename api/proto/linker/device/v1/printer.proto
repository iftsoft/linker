syntax = "proto3"; // Specifies the protobuf syntax version

option go_package = "./gen/go/linker/device/v1"; // Optional: Specifies the Go package name for generated code

package linker.device.v1; // Defines the package name for the service and messages

// Defines the message structure for a printer query
message PrinterQuery {
  string device = 1;
  string text = 2;
}

// Defines the message structure for a printer setup
message PrinterSetup {
  string device = 1;
  uint32 paper_path = 2;
  bool landscape = 3;
  uint32 show_image = 4;
}

// Defines the message structure for a printer progress
message ProgressNotify {
  string doc_name = 2;
  uint32 page_done = 3;
  uint32 pages_all = 4;
}

