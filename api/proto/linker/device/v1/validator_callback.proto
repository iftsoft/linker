syntax = "proto3"; // Specifies the protobuf syntax version

option go_package = "./gen/go/linker/device/v1"; // Optional: Specifies the Go package name for generated code

package linker.device.v1; // Defines the package name for the service and messages

import "linker/device/v1/device.proto";
import "linker/device/v1/validator.proto";

// Defines the gRPC service with an RPC method
service ValidatorCallbackService {
  // NoteAccepted sends notification about new note in escrow
  rpc NoteAccepted(NoteAcceptedRequest) returns (NoteAcceptedResponse) {}
  // CashIsStored sends notification that note is stored to cassette
  rpc CashIsStored(CashIsStoredRequest) returns (CashIsStoredResponse) {}
  // CashReturned sends notification that note is returned to user
  rpc CashReturned(CashReturnedRequest) returns (CashReturnedResponse) {}
  // ValidatorStore sends notification about current cassette state
  rpc ValidatorStore(ValidatorStoreRequest) returns (ValidatorStoreResponse) {}
}

// Defines the message structure for a new accepted note
message NoteAcceptedRequest {
  DeviceNotify notify = 1;
  AcceptNotify data = 2;
}

// Defines the message structure for the new accepted note response
message NoteAcceptedResponse {}

// Defines the message structure for a stored note request
message CashIsStoredRequest {
  DeviceNotify notify = 1;
  AcceptNotify data = 2;
}

// Defines the message structure for the stored note response
message CashIsStoredResponse {}

// Defines the message structure for a returned note request
message CashReturnedRequest {
  DeviceNotify notify = 1;
  AcceptNotify data = 2;
}

// Defines the message structure for the returned note response
message CashReturnedResponse {}

// Defines the message structure for a store content request
message ValidatorStoreRequest {
  DeviceNotify notify = 1;
  BatchContent data = 2;
}

// Defines the message structure for the store content response
message ValidatorStoreResponse {}
