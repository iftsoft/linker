syntax = "proto3"; // Specifies the protobuf syntax version

option go_package = "./gen/go/linker/system/v1"; // Optional: Specifies the Go package name for generated code

package linker.system.v1; // Defines the package name for the service and messages

import "linker/system/v1/system.proto";

// Defines the gRPC service with an RPC method
service SystemCallbackService {
  // GreetingInfo sends notification about device application
  rpc GreetingInfo(GreetingInfoRequest) returns (GreetingInfoResponse) {}
  // Notification about system reply
  rpc SystemReply(SystemReplyRequest) returns (SystemReplyResponse) {}
  // Notification about system device
  rpc SystemDevice(SystemDeviceRequest) returns (SystemDeviceResponse) {}
  // Notification about system health
  rpc SystemHealth(SystemHealthRequest) returns (SystemHealthResponse) {}
}

// Defines the message structure for a greeting info request
message GreetingInfoRequest {
  GreetingInfo data = 1;
}

// Defines the message structure for the greeting info response
message GreetingInfoResponse {}

// Defines the message structure for a system reply request
message SystemReplyRequest {
  SystemReply data = 1;
}

// Defines the message structure for the system reply response
message SystemReplyResponse {}

// Defines the message structure for an system device request
message SystemDeviceRequest {
  SystemReply data = 1;
  DeviceSetup setup = 2;
}

// Defines the message structure for an system device response
message SystemDeviceResponse {}

// Defines the message structure for an system health request
message SystemHealthRequest {
  SystemReply data = 1;
  DeviceMetrics metrics = 2;
}

// Defines the message structure for an system health response
message SystemHealthResponse {}

