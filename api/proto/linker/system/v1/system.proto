syntax = "proto3"; // Specifies the protobuf syntax version

option go_package = "./gen/go/linker/system/v1"; // Optional: Specifies the Go package name for generated code

package linker.system.v1; // Defines the package name for the service and messages

import "google/protobuf/struct.proto";

// Defines the message structure for a greeting info
message GreetingInfo {
  string app_name = 1;
  string dev_name = 2;
  uint32 grpc_port = 3;
}

// Defines the message structure for a system query
message SystemQuery {
  string device = 1;
}

// Defines the message structure for a system config
message SystemConfig {
  string device = 1;
  uint32 link_type = 2;  // 0-none, 1-COM, 2-USB
  string port_name = 3;  // Serial port name
  uint32 vendor_id = 4;  // Device Vendor ID
  uint32 product_id = 5; // Device Product ID
}

// Defines the message structure for a system reply
message SystemReply {
  string device = 1;
  string command = 2;
  string message = 3;
  uint32 sys_error = 4;
  uint32 sys_state = 5;
}

// Defines the message structure for a system device
message SystemSetup {
  uint64 dev_type = 1;
  uint64 supported = 2;
  uint64 required = 3;
  string description = 4;
}

// Defines the message structure for a system metrics
message SystemMetrics {
  int64 moment = 1;
  uint64 uptime = 2;
  uint32 dev_error = 3;
  uint32 dev_state = 4;
  google.protobuf.Struct content = 7;
}

